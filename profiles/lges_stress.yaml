company:
  name: "LG Energy Solution Synthetic"
  profile: "lges_stress"

period:
  start_month: "2022-01"
  end_month: "2026-12"

scale:
  legal_entities: 24
  business_units: 12
  sites: 200
  production_lines: 1500
  products: 900
  suppliers: 10000
  meters: 30000

activity_types:
  electricity:
    standard_unit: "kWh"
    scope: "Scope2"
  diesel:
    standard_unit: "L"
    scope: "Scope1"
  natural_gas:
    standard_unit: "Nm3"
    scope: "Scope1"
  steam:
    standard_unit: "ton"
    scope: "Scope2"

source_mix:
  erp_energy_csv: 0.20
  mes_production_csv: 0.15
  ems_meter_jsonl: 0.35
  supplier_excel: 0.15
  manual_csv: 0.05
  field_notes_txt: 0.05
  email_jsonl: 0.05

noise:
  missing_rate: 0.04
  duplicate_rate: 0.02
  unit_error_rate: 0.05
  period_error_rate: 0.02
  site_alias_rate: 0.12
  outlier_rate: 0.04
  negative_amount_rate: 0.006
  reporting_boundary_error_rate: 0.01

output:
  chunk_size: 100000
  partition_by_month: true
  include_ground_truth: true
  include_source_to_truth_map: true
